<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Example</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; background-color: #f4f4f4; color: #333; }
        h1 { color: #0056b3; }
        button { padding: 10px 18px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; transition: background-color 0.3s ease; }
        button:hover { background-color: #0056b3; }
        #results { margin-top: 25px; padding: 15px; border: 1px solid #ddd; background-color: #fff; border-radius: 5px; min-height: 80px; }
        #results pre { background-color: #e9ecef; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <h1>JavaScript Fetch API: Simple GET Request</h1>
    <p>Click the button below to fetch a sample ToDo item from <a href="https://jsonplaceholder.typicode.com/" target="_blank">JSONPlaceholder</a> using the Fetch API. This demonstrates a basic asynchronous network request.</p>
    <button id="fetchButton">Fetch Sample ToDo</button>
    
    <div id="results">
        <p>Data will appear here after you click the button...</p>
    </div>

    <script>
        const fetchButton = document.getElementById('fetchButton');
        const resultsDiv = document.getElementById('results');

        fetchButton.addEventListener('click', () => {
            resultsDiv.innerHTML = '<p>Fetching data... Please wait.</p>'; // Provide user feedback

            // The core of the Fetch API: making a network request.
            // It returns a Promise that resolves to the Response object.
            fetch('https://jsonplaceholder.typicode.com/todos/1')
                .then(response => {
                    // Check if the request was successful (status code 200-299).
                    // If not, throw an error to be caught by the .catch block.
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    // The .json() method on the Response object parses the body text as JSON.
                    // It also returns a Promise, which resolves with the parsed JSON data.
                    return response.json();
                })
                .then(data => {
                    // This block executes when the JSON data is successfully parsed.
                    // We display the fetched data in a pre-formatted tag.
                    resultsDiv.innerHTML = `
                        <h2>Fetched ToDo Item:</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                })
                .catch(error => {
                    // This block executes if any error occurs during the fetch operation
                    // (e.g., network error, HTTP error status, JSON parsing error).
                    resultsDiv.innerHTML = `<p class="error">Error fetching data: ${error.message}</p>`;
                    console.error('Fetch error:', error);
                });
        });
    </script>
</body>
</html>
